# Temporary DB integration test compose — not for production
# Tests sqlite, postgres, and mariadb backends simultaneously
# Usage: docker compose -f docker/docker-compose.dbtest.yml up
# Cleanup: docker compose -f docker/docker-compose.dbtest.yml down -v
name: caspb-dbtest

x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

x-app-base: &app-base
  image: ghcr.io/casjay-forks/caspaste:latest
  pull_policy: never
  restart: "no"
  logging: *default-logging
  environment:
    - TZ=UTC
    - CASPB_DB_CLEANUP_PERIOD=1m
  healthcheck:
    test: ["CMD", "caspb", "--status"]
    interval: 15s
    timeout: 12s
    retries: 6
    start_period: 30s

services:
  # ── SQLite (default) ──────────────────────────────────────────────────────
  app-sqlite:
    <<: *app-base
    container_name: caspb-dbtest-sqlite
    ports:
      - "18081:80"
    environment:
      - TZ=UTC
      - PORT=80
      - CASPB_DB_CLEANUP_PERIOD=1m
      - CASPB_DB_DRIVER=sqlite
    volumes:
      - sqlite-data:/data
    networks:
      - caspb-dbtest

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: caspb-dbtest-postgres
    restart: "no"
    logging: *default-logging
    environment:
      - POSTGRES_USER=caspb
      - POSTGRES_PASSWORD=caspb
      - POSTGRES_DB=caspb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - caspb-dbtest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caspb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-postgres:
    <<: *app-base
    container_name: caspb-dbtest-app-postgres
    ports:
      - "18082:80"
    environment:
      - TZ=UTC
      - PORT=80
      - CASPB_DB_CLEANUP_PERIOD=1m
      - CASPB_DB_DRIVER=postgres
      - CASPB_DB_SOURCE=postgres://caspb:caspb@postgres:5432/caspb?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - caspb-dbtest

  # ── MariaDB ───────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: caspb-dbtest-mariadb
    restart: "no"
    logging: *default-logging
    environment:
      - MARIADB_USER=caspaste
      - MARIADB_PASSWORD=caspaste
      - MARIADB_DATABASE=caspaste
      - MARIADB_ROOT_PASSWORD=rootpassword
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - caspb-dbtest
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-mariadb:
    <<: *app-base
    container_name: caspb-dbtest-app-mariadb
    ports:
      - "18083:80"
    environment:
      - TZ=UTC
      - PORT=80
      - CASPB_DB_CLEANUP_PERIOD=1m
      - CASPB_DB_DRIVER=mysql
      - CASPB_DB_SOURCE=mariadb://caspb:caspb@mariadb:3306/caspaste
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - caspb-dbtest

volumes:
  sqlite-data:
  postgres-data:
  mariadb-data:

networks:
  caspb-dbtest:
    name: caspb-dbtest
    external: false
