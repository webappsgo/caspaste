# caspb — development compose
# Usage: docker compose -f docker/docker-compose.dev.yml up -d
# Development compose - HUMAN USE ONLY (never used by AI)

name: caspb-dev

x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  caspb:
    image: ghcr.io/casjay-forks/caspb:devel
    container_name: caspb-dev
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: unless-stopped
    pull_policy: always
    logging: *default-logging
    environment:
      - MODE=development
      - PORT=80
      - DEBUG=true
      - TZ=${TZ:-America/New_York}
      - CASPB_DB_DRIVER=sqlite
    ports:
      - '8080:80'
    volumes:
      - './volumes/config:/config:z'
      - './volumes/data:/data:z'
    healthcheck:
      test: /usr/local/bin/caspb --status
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - caspb-dev

networks:
  caspb-dev:
    name: caspb-dev
    external: false
