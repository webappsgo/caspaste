# caspaste — self-hosted pastebin service
# nginx proxy address - http://172.17.0.1:64580
# Production compose - HUMAN USE ONLY (never used by AI)

name: caspaste

x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  caspaste:
    image: ghcr.io/casjay-forks/caspaste:latest
    container_name: caspaste-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      - MODE=production
      - PORT=80
      - DEBUG=false
      - TZ=${TZ:-America/New_York}
      - CASPASTE_DB_DRIVER=postgres
      - CASPASTE_DB_SOURCE=postgres://${DB_USER:-caspaste}:${DB_PASSWORD:-caspaste}@caspaste-db:5432/${DB_NAME:-caspaste}?sslmode=disable
      - CASPASTE_TITLE_MAX_LENGTH=120
      - CASPASTE_BODY_MAX_LENGTH=9999999999999999
      - CASPASTE_MAX_PASTE_LIFETIME=unlimited
      - CASPASTE_UI_DEFAULT_LIFETIME=never
      - CASPASTE_UI_DEFAULT_THEME=dark
    volumes:
      - './volumes/config:/config:z'
      - './volumes/data:/data:z'
    ports:
      - '172.17.0.1:64580:80'
    healthcheck:
      test: /usr/local/bin/caspaste --status
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    depends_on:
      caspaste-db:
        condition: service_healthy
    networks:
      - caspaste

  caspaste-db:
    image: postgres:16-alpine
    pull_policy: always
    container_name: caspaste-db
    restart: always
    logging: *default-logging
    environment:
      - POSTGRES_DB=${DB_NAME:-caspaste}
      - POSTGRES_USER=${DB_USER:-caspaste}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-caspaste}
      - TZ=${TZ:-America/New_York}
    volumes:
      - './volumes/data/db/postgres/caspaste:/var/lib/postgresql/data:z'
    healthcheck:
      test: pg_isready -U caspaste -d caspaste
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - caspaste

networks:
  caspaste:
    name: caspaste
    external: false
