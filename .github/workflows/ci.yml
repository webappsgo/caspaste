name: CI

# NOTE: This workflow requires the :build toolchain image in ghcr.io.
# If you see "Build image not found" errors, run the 'Build Toolchain Image'
# workflow first via Actions → Build Toolchain Image → Run workflow.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'   # Weekly security jobs on Monday 06:00 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ensure-build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      image: ${{ steps.pull.outputs.image }}
    steps:
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: pull
        name: Pull build image (fail fast if missing)
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build"
          if ! docker pull "$IMAGE"; then
            echo "::error::Build image $IMAGE not found."
            echo "::error::Trigger the 'Build Toolchain Image' workflow (workflow_dispatch) to create it."
            echo "::error::Never commit ci.yml or release.yml before the build image exists in the registry."
            exit 1
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  lint:
    needs: ensure-build-image
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: go vet ./...
      - run: staticcheck ./...

  test:
    needs: ensure-build-image
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: go test -cover -coverprofile=coverage.out ./...
      - name: Enforce coverage threshold
        run: |
          THRESHOLD=5  # Minimum gate — raise as unit tests are added (target: 80%)
          PCT=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print int($3)}')
          if [ "$PCT" -lt "$THRESHOLD" ]; then
            echo "::error::coverage $PCT% < threshold $THRESHOLD%"
            exit 1
          fi
          echo "Coverage: $PCT% (threshold $THRESHOLD%) ✓"

  build:
    needs: [ensure-build-image, lint, test]
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: go build ./...

  vuln-check:
    needs: ensure-build-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: govulncheck ./...

  secret-scan:
    needs: ensure-build-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Scan for secrets (truffleHog)
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ -n "$BEFORE" ] && [ -n "$AFTER" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            trufflehog git --since-commit "$BEFORE" --branch "$AFTER" --fail file://. 2>&1 || true
          else
            trufflehog git --depth 1 --fail file://. 2>&1 || true
          fi

  workflow-policy:
    needs: ensure-build-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Verify all Actions are pinned to full SHA
        run: |
          FAILED=0
          for f in .github/workflows/*.yml; do
            while IFS= read -r line; do
              if echo "$line" | grep -qE '^\s+uses:' && \
                 echo "$line" | grep -qE '@' && \
                 ! echo "$line" | grep -qE '@[0-9a-f]{40}'; then
                echo "::error file=$f::Action not pinned to full SHA: $line"
                FAILED=1
              fi
            done < "$f"
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more Actions use mutable tags instead of full commit SHAs."
            exit 1
          fi
          echo "All Actions are SHA-pinned ✓"

  image-scan:
    needs: [ensure-build-image, build]
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Trivy filesystem vulnerability scan
        run: |
          trivy fs \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --no-progress \
            .
